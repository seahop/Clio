name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE:  ghcr.io/seahop/clio-backend
  FRONTEND_IMAGE: ghcr.io/seahop/clio-frontend
  OMNIBUS_IMAGE:  ghcr.io/seahop/clio

jobs:
  # HA backend image — used by docker-compose multi-container deployments
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend image
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
          labels: |
            org.opencontainers.image.title=Clio Backend
            org.opencontainers.image.description=Clio red team logging platform — backend API server for HA multi-container deployments
            org.opencontainers.image.vendor=seahop
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/seahop/Clio

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: backend
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # HA frontend image — nginx serving static React build, used by Kubernetes
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for frontend image
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
          labels: |
            org.opencontainers.image.title=Clio Frontend
            org.opencontainers.image.description=Clio red team logging platform — nginx serving the static React UI for HA/Kubernetes deployments
            org.opencontainers.image.vendor=seahop
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/seahop/Clio

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: frontend-prod
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # Omnibus image — single-container self-host (docker pull ghcr.io/seahop/clio)
  build-omnibus:
    name: Build Omnibus Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for omnibus image
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.OMNIBUS_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
          labels: |
            org.opencontainers.image.title=Clio
            org.opencontainers.image.description=Clio red team logging platform — single-container (Nginx + backend + Redis + PostgreSQL)
            org.opencontainers.image.vendor=seahop
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/seahop/Clio

      - name: Build and push omnibus image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: omnibus
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=omnibus
          cache-to: type=gha,mode=max,scope=omnibus

  # Gate job — all three images must succeed; use this for branch protection rules
  images-published:
    name: Images Published
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-omnibus]
    if: github.event_name != 'pull_request'
    steps:
      - name: Summary
        run: |
          echo "## Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Registry | Use case |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Omnibus (1 container) | \`ghcr.io/seahop/clio\` | Simple self-host |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend (HA / K8s)    | \`ghcr.io/seahop/clio-backend\` | Multi-container |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (HA / K8s)   | \`ghcr.io/seahop/clio-frontend\` | Multi-container |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick start (omnibus)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "docker run -d --name clio -p 443:443 -p 80:80 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e EXTERNAL_HOSTNAME=your-server-ip \\" >> $GITHUB_STEP_SUMMARY
          echo "  -v clio-data:/data \\" >> $GITHUB_STEP_SUMMARY
          echo "  ghcr.io/seahop/clio:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
