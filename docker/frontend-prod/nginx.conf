server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Backend service URL — injected at container start via envsubst.
    # Default: http://clio-backend:3001 (Kubernetes service name).
    # Override with BACKEND_URL env var for other environments.

    # Security headers
    add_header X-Content-Type-Options   "nosniff"                             always;
    add_header X-Frame-Options          "DENY"                                always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"     always;

    # Static React app — serve index.html for all non-asset paths so that
    # client-side routing works correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin            $scheme://$host;
        proxy_read_timeout 120s;
    }

    # Export file downloads
    location /exports/ {
        proxy_pass ${BACKEND_URL}/exports/;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Relation-service compatibility — rewrite /relation-service/api/* → /api/*
    # (relation-service was merged into the backend under /api)
    location /relation-service/api/ {
        rewrite ^/relation-service/api/(.*)$ /api/$1 break;
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin            $scheme://$host;
        proxy_read_timeout 120s;
    }

    # Ingest shortcut — rewrite /ingest → /api/ingest
    location /ingest {
        rewrite ^/ingest(.*)$ /api/ingest$1 break;
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Disable caching for the HTML entry point so browsers always pick up
    # new JS/CSS bundle filenames after a deploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Long-lived cache for content-addressed assets (CRA appends hash to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable access log for favicon to reduce noise
    location = /favicon.ico {
        log_not_found off;
        access_log    off;
    }
}
