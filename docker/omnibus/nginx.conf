# Clio omnibus nginx configuration
# Serves React static files and proxies API paths to the backend (127.0.0.1:3001).

user nginx;
worker_processes 1;
error_log /data/logs/nginx-error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    access_log   /data/logs/nginx-access.log;
    client_max_body_size 100m;

    # Shared proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Forward cookies untouched so JWT httpOnly cookies work
    proxy_set_header Cookie            $http_cookie;
    proxy_pass_header Set-Cookie;
    # Back-end is HTTPS on loopback — skip cert verification for self-signed cert
    proxy_ssl_verify off;
    # Generous timeouts for export / analysis operations
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /data/certs/server.crt;
        ssl_certificate_key /data/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── React SPA ─────────────────────────────────────────────────────────
        location / {
            root  /app/frontend/build;
            index index.html;
            # Security headers for static content (the backend sets its own via
            # Helmet on /api responses; these cover the nginx-served SPA).
            add_header X-Content-Type-Options   "nosniff"                                   always;
            add_header X-Frame-Options          "DENY"                                      always;
            add_header Referrer-Policy          "strict-origin-when-cross-origin"           always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"      always;
            # Route all non-file requests to index.html for client-side routing
            try_files $uri $uri/ /index.html;
        }

        # ── Backend API ───────────────────────────────────────────────────────
        location /api/ {
            proxy_pass https://127.0.0.1:3001;
        }

        # ── Static export downloads ───────────────────────────────────────────
        location /exports/ {
            proxy_pass https://127.0.0.1:3001;
        }

        # ── Relation-service paths (consolidated into backend) ────────────────
        # Frontend still calls /relation-service/api/; nginx rewrites to /api/
        location /relation-service/ {
            rewrite ^/relation-service/api/(.*)$ /api/$1 break;
            proxy_pass https://127.0.0.1:3001;
        }

        # ── External log ingest (for log_exporter / C2 forwarders) ───────────
        location /ingest/ {
            rewrite ^/ingest/(.*)$ /api/ingest/$1 break;
            proxy_pass https://127.0.0.1:3001;
        }
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }
}
