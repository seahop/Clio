# Clio omnibus — single-container deployment
#
# Everything (Nginx, backend, Redis, PostgreSQL) runs inside one image.
# All state persists in the 'clio-data' volume.
#
# Quick start:
#   docker compose -f docker-compose.omnibus.yml up -d
#
# To build the image locally instead of pulling:
#   docker compose -f docker-compose.omnibus.yml build
#   docker compose -f docker-compose.omnibus.yml up -d
#
# First boot prints admin credentials to the container logs:
#   docker compose -f docker-compose.omnibus.yml logs clio

services:
  clio:
    # Pull from registry (change tag as needed):
    image: ghcr.io/seahop/clio:latest
    # Or build locally:
    # build:
    #   context: .
    #   target: omnibus
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - clio-data:/data
    environment:
      # Override the admin password (auto-generated on first boot if not set)
      ADMIN_PASSWORD: ""
      # Hostname used for the self-signed TLS cert SAN and CORS.
      # Set to your server's IP or domain name.
      EXTERNAL_HOSTNAME: "localhost"
      # Set EXTERNAL_PORT if you map to a non-standard port (e.g. -p 8443:443).
      # This is included in FRONTEND_URL so CORS allows the correct browser origin.
      # Leave unset (or 443) when running on the default HTTPS port.
      # EXTERNAL_PORT: "8443"
      # Optional: mount your own TLS certificate instead of the auto-generated
      # self-signed one (e.g. from an internal CA). Mount the files into the
      # container (see volumes) and point these at them. The cert file must be
      # the FULL CHAIN (leaf + intermediates); the key must be unencrypted PEM.
      # When set, the cert is never overwritten by hostname changes.
      # TLS_CERT_FILE: /run/secrets/tls.crt
      # TLS_KEY_FILE:  /run/secrets/tls.key
      # Optional: mount your internal CA bundle so outbound backend HTTPS calls
      # (e.g. OIDC discovery/JWKS against an internal-CA identity provider) are
      # verified against it. When set, outbound TLS verification is ENABLED
      # (NODE_TLS_REJECT_UNAUTHORIZED=1); when unset, verification stays off.
      # NODE_EXTRA_CA_CERTS: /run/secrets/internal-ca.pem

      # ── Google SSO (optional) ─────────────────────────────────────────────
      # Register https://<EXTERNAL_HOSTNAME>/api/auth/google/callback as an
      # authorized redirect URI in the Google Cloud Console.
      # GOOGLE_CLIENT_ID: "your-client-id.apps.googleusercontent.com"
      # GOOGLE_CLIENT_SECRET: "your-client-secret"
      # GOOGLE_CALLBACK_URL: ""   # defaults to https://<EXTERNAL_HOSTNAME>[:<EXTERNAL_PORT>]/api/auth/google/callback

      # ── Generic OIDC (optional) ───────────────────────────────────────────
      # Works with any OIDC-compliant provider: Keycloak, Okta, Auth0, Azure AD, etc.
      # Register https://<EXTERNAL_HOSTNAME>/api/auth/oidc/callback as an
      # allowed redirect URI in your provider.
      # OIDC_ISSUER_URL: "https://your-provider/realms/your-realm"
      # OIDC_CLIENT_ID: "clio"
      # OIDC_CLIENT_SECRET: "your-client-secret"
      # OIDC_PROVIDER_NAME: "Keycloak"   # label shown on the login button
      # OIDC_CALLBACK_URL: ""            # defaults to https://<EXTERNAL_HOSTNAME>[:<EXTERNAL_PORT>]/api/auth/oidc/callback
      # OIDC_SCOPE: "openid email profile"  # default; adjust if your provider requires different scopes
      # OIDC_ID_TOKEN_ALG: ""            # override the ID-token signing algorithm (e.g. ES256) if
      #                                  # auto-detection from the provider's JWKS picks the wrong one
    restart: unless-stopped
    # Healthcheck hits the backend health endpoint via nginx
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost/api/csrf-token"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  clio-data:
    driver: local
