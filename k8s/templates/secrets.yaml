{{- /*
  Secrets are auto-generated on first install and preserved on every upgrade.

  Pattern: lookup the existing Secret; if a key is already there decode it,
  otherwise generate a fresh random value.  This mirrors the omnibus entrypoint
  which generates secrets on first boot and persists them to .secrets.env.

  NOTE: ternary is NOT used here because it evaluates both branches eagerly —
  b64dec on a missing key returns nil and causes a template error on first
  install.  if/else evaluates only the taken branch.

  To rotate all secrets:
    kubectl delete secret clio-secrets -n <namespace>
    helm upgrade clio ./k8s -n <namespace> -f my-values.yaml
*/ -}}
{{- $existing := lookup "v1" "Secret" .Values.namespace "clio-secrets" -}}
{{- $d := dict -}}
{{- if and $existing $existing.data -}}
{{- $d = $existing.data -}}
{{- end -}}

{{- $postgresPass  := "" -}}
{{- if hasKey $d "POSTGRES_PASSWORD"    -}}{{- $postgresPass  = index $d "POSTGRES_PASSWORD"    | b64dec -}}{{- else -}}{{- $postgresPass  = randAlphaNum 32 -}}{{- end -}}
{{- $redisPass     := "" -}}
{{- if hasKey $d "REDIS_PASSWORD"       -}}{{- $redisPass     = index $d "REDIS_PASSWORD"       | b64dec -}}{{- else -}}{{- $redisPass     = randAlphaNum 32 -}}{{- end -}}
{{- $jwtSecret     := "" -}}
{{- if hasKey $d "JWT_SECRET"           -}}{{- $jwtSecret     = index $d "JWT_SECRET"           | b64dec -}}{{- else -}}{{- $jwtSecret     = randAlphaNum 64 -}}{{- end -}}
{{- $csrfSecret    := "" -}}
{{- if hasKey $d "CSRF_SECRET"          -}}{{- $csrfSecret    = index $d "CSRF_SECRET"          | b64dec -}}{{- else -}}{{- $csrfSecret    = randAlphaNum 64 -}}{{- end -}}
{{- $sessionSecret := "" -}}
{{- if hasKey $d "SESSION_SECRET"       -}}{{- $sessionSecret = index $d "SESSION_SECRET"       | b64dec -}}{{- else -}}{{- $sessionSecret = randAlphaNum 32 -}}{{- end -}}
{{- $redisEncKey   := "" -}}
{{- if hasKey $d "REDIS_ENCRYPTION_KEY" -}}{{- $redisEncKey   = index $d "REDIS_ENCRYPTION_KEY" | b64dec -}}{{- else -}}{{- $redisEncKey   = randAlphaNum 32 -}}{{- end -}}
{{- $adminPass     := "" -}}
{{- if hasKey $d "ADMIN_PASSWORD"       -}}{{- $adminPass     = index $d "ADMIN_PASSWORD"       | b64dec -}}{{- else -}}{{- $adminPass     = randAlphaNum 16 -}}{{- end -}}
{{- $userPass      := "" -}}
{{- if hasKey $d "USER_PASSWORD"        -}}{{- $userPass      = index $d "USER_PASSWORD"        | b64dec -}}{{- else -}}{{- $userPass      = randAlphaNum 16 -}}{{- end -}}
{{- $fieldEncKey   := "" -}}
{{- if hasKey $d "FIELD_ENCRYPTION_KEY" -}}{{- $fieldEncKey   = index $d "FIELD_ENCRYPTION_KEY" | b64dec -}}{{- else -}}{{- $fieldEncKey   = randAlphaNum 32 -}}{{- end -}}

apiVersion: v1
kind: Secret
metadata:
  name: clio-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "clio.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ── Database ────────────────────────────────────────────────────────────────
  POSTGRES_USER:         {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD:     {{ $postgresPass | quote }}
  POSTGRES_DB:           {{ .Values.secrets.postgresDb | quote }}

  # ── Redis ───────────────────────────────────────────────────────────────────
  REDIS_PASSWORD:        {{ $redisPass | quote }}

  # ── Application secrets ─────────────────────────────────────────────────────
  JWT_SECRET:            {{ $jwtSecret | quote }}
  CSRF_SECRET:           {{ $csrfSecret | quote }}
  SESSION_SECRET:        {{ $sessionSecret | quote }}
  REDIS_ENCRYPTION_KEY:  {{ $redisEncKey | quote }}

  # ── Field-level encryption ──────────────────────────────────────────────────
  FIELD_ENCRYPTION_KEY:  {{ $fieldEncKey | quote }}

  # ── Login credentials ───────────────────────────────────────────────────────
  ADMIN_PASSWORD:        {{ $adminPass | quote }}
  USER_PASSWORD:         {{ $userPass | quote }}

  # ── Google OAuth client secret (only when googleSso.enabled=true) ───────────
  {{- if .Values.googleSso.enabled }}
  GOOGLE_CLIENT_SECRET: {{ required "secrets.googleClientSecret is required when googleSso.enabled=true" .Values.secrets.googleClientSecret | quote }}
  {{- end }}

  # ── Generic OIDC client secret (only when oidc.enabled=true) ────────────────
  {{- if .Values.oidc.enabled }}
  OIDC_CLIENT_SECRET: {{ required "secrets.oidcClientSecret is required when oidc.enabled=true" .Values.secrets.oidcClientSecret | quote }}
  {{- end }}
