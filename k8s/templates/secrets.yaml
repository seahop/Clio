apiVersion: v1
kind: Secret
metadata:
  name: clio-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "clio.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER:         {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD:     {{ .Values.secrets.postgresPassword | quote }}
  POSTGRES_DB:           {{ .Values.secrets.postgresDb | quote }}
  REDIS_PASSWORD:        {{ .Values.secrets.redisPassword | quote }}
  JWT_SECRET:            {{ .Values.secrets.jwtSecret | quote }}
  CSRF_SECRET:           {{ .Values.secrets.csrfSecret | quote }}
  SESSION_SECRET:        {{ .Values.secrets.sessionSecret | quote }}
  REDIS_ENCRYPTION_KEY:  {{ .Values.secrets.redisEncryptionKey | quote }}
  {{- if .Values.secrets.googleClientId }}
  GOOGLE_CLIENT_ID:      {{ .Values.secrets.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET:  {{ .Values.secrets.googleClientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.oidcIssuerUrl }}
  OIDC_ISSUER_URL:       {{ .Values.secrets.oidcIssuerUrl | quote }}
  OIDC_CLIENT_ID:        {{ .Values.secrets.oidcClientId | quote }}
  OIDC_CLIENT_SECRET:    {{ .Values.secrets.oidcClientSecret | quote }}
  {{- end }}
