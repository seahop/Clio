apiVersion: v1
kind: Secret
metadata:
  name: clio-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "clio.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ── Database ────────────────────────────────────────────────────────────────
  POSTGRES_USER:         {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD:     {{ .Values.secrets.postgresPassword | quote }}
  POSTGRES_DB:           {{ .Values.secrets.postgresDb | quote }}

  # ── Redis ───────────────────────────────────────────────────────────────────
  REDIS_PASSWORD:        {{ .Values.secrets.redisPassword | quote }}

  # ── Application secrets ─────────────────────────────────────────────────────
  JWT_SECRET:            {{ .Values.secrets.jwtSecret | quote }}
  CSRF_SECRET:           {{ .Values.secrets.csrfSecret | quote }}
  SESSION_SECRET:        {{ .Values.secrets.sessionSecret | quote }}
  REDIS_ENCRYPTION_KEY:  {{ .Values.secrets.redisEncryptionKey | quote }}

  # ── Google OAuth client secret (only when googleSso.enabled=true) ───────────
  {{- if .Values.googleSso.enabled }}
  GOOGLE_CLIENT_SECRET: {{ required "secrets.googleClientSecret is required when googleSso.enabled=true" .Values.secrets.googleClientSecret | quote }}
  {{- end }}

  # ── Generic OIDC client secret (only when oidc.enabled=true) ────────────────
  {{- if .Values.oidc.enabled }}
  OIDC_CLIENT_SECRET: {{ required "secrets.oidcClientSecret is required when oidc.enabled=true" .Values.secrets.oidcClientSecret | quote }}
  {{- end }}
