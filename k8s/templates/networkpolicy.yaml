    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- if .Values.linkerd.enabled }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd
{{- end }}
