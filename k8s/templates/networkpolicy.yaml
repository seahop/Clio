    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "clio.selectorLabels" (dict "root" . "component" "frontend") | nindent 14 }}
      ports:
        - port: {{ .Values.backend.port }}
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "clio.selectorLabels" (dict "root" . "component" "postgres") | nindent 14 }}
      ports:
        - port: {{ .Values.postgres.port }}
