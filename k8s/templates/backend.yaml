apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clio.fullname" . }}-backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "clio.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "clio.selectorLabels" (dict "root" . "component" "backend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "clio.selectorLabels" (dict "root" . "component" "backend") | nindent 8 }}
      {{- if .Values.linkerd.enabled }}
      annotations:
        linkerd.io/inject: enabled
        # Skip Linkerd's outbound mTLS for database ports. Linkerd edge's
        # transport-header protocol breaks opaque TCP (Redis RESP, Postgres),
        # causing persistent ECONNRESET. Traffic stays in-cluster; the inbound
        # Linkerd proxy on each DB pod still accepts plain connections via
        # defaultInboundPolicy: all-unauthenticated.
        config.linkerd.io/skip-outbound-ports: "6379,5432"
      {{- end }}
    spec:
      {{- if .Values.backend.podSecurityContext.enabled }}
      securityContext:
        runAsNonRoot: {{ .Values.backend.podSecurityContext.runAsNonRoot }}
        runAsUser: {{ .Values.backend.podSecurityContext.runAsUser }}
        fsGroup: {{ .Values.backend.podSecurityContext.fsGroup }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: clio-config
            - secretRef:
                name: clio-secrets
          volumeMounts:
            - name: evidence
              mountPath: /app/evidence
          readinessProbe:
            httpGet:
              path: /api/csrf-token
              port: {{ .Values.backend.port }}
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/csrf-token
              port: {{ .Values.backend.port }}
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      volumes:
        - name: evidence
          persistentVolumeClaim:
            claimName: clio-evidence
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clio.fullname" . }}-backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "clio.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "clio.selectorLabels" (dict "root" . "component" "backend") | nindent 4 }}
