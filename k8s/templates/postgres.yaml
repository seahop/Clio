{{- $storageClass := .Values.postgres.storage.storageClass -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "clio.fullname" . }}-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "clio.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "clio.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "clio.selectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "clio.selectorLabels" (dict "root" . "component" "postgres") | nindent 8 }}
      {{- if .Values.linkerd.enabled }}
      annotations:
        linkerd.io/inject: enabled
      {{- end }}
    spec:
      securityContext:
        fsGroup: 999    # postgres group
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: {{ .Values.postgres.port }}
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: clio-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clio-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: clio-secrets
                  key: POSTGRES_DB
            - name: TZ
              value: UTC
            - name: PGTZ
              value: UTC
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
        {{- if $storageClass }}
        storageClassName: {{ $storageClass }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clio.fullname" . }}-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "clio.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  # ClusterIP: None would make this headless (DNS resolves to pod IP directly)
  # — leave as a regular ClusterIP so the backend can use the service name.
  ports:
    - name: postgres
      port: {{ .Values.postgres.port }}
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "clio.selectorLabels" (dict "root" . "component" "postgres") | nindent 4 }}
