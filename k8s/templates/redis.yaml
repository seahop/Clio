{{- $storageClass := .Values.redis.storage.storageClass -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "clio.fullname" . }}-redis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "clio.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  serviceName: {{ include "clio.fullname" . }}-redis
  replicas: 1
  selector:
    matchLabels:
      {{- include "clio.selectorLabels" (dict "root" . "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "clio.selectorLabels" (dict "root" . "component" "redis") | nindent 8 }}
      {{- if .Values.linkerd.enabled }}
      annotations:
        linkerd.io/inject: enabled
      {{- end }}
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          command:
            - redis-server
            - /etc/redis/redis.conf
            - --requirepass
            - $(REDIS_PASSWORD)
          ports:
            - name: redis
              containerPort: {{ .Values.redis.port }}
              protocol: TCP
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clio-secrets
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/redis
          readinessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: clio-redis-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.redis.storage.size }}
        {{- if $storageClass }}
        storageClassName: {{ $storageClass }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clio.fullname" . }}-redis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "clio.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: {{ .Values.redis.port }}
      targetPort: redis
      protocol: TCP
  selector:
    {{- include "clio.selectorLabels" (dict "root" . "component" "redis") | nindent 4 }}
