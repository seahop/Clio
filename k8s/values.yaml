# ─────────────────────────────────────────────────────────────────────────────
# Clio Helm chart — default values
#
# Override any value at install/upgrade time:
#   helm install clio ./k8s -f my-values.yaml
#   helm install clio ./k8s --set ingress.host=clio.example.com
#
# See docs/kubernetes.md for the full deployment guide.
# ─────────────────────────────────────────────────────────────────────────────

# -- Kubernetes namespace (create it first: kubectl create namespace clio)
namespace: clio

# ── Images ────────────────────────────────────────────────────────────────────
backend:
  image:
    repository: ghcr.io/seahop/clio-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3001
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Evidence file uploads — needs a PVC
  evidenceStorage:
    size: 10Gi
    storageClass: ""   # leave blank to use cluster default
  # Pod security context.
  # Enable runAsNonRoot once the image is built with a non-root USER directive
  # (docker build --target backend sets USER node / chown -R node:node /app).
  # The published ghcr.io image currently runs as root, so this is off by default.
  podSecurityContext:
    enabled: false
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

frontend:
  image:
    repository: ghcr.io/seahop/clio-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

postgres:
  image:
    repository: postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent
  port: 5432
  storage:
    size: 20Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  image:
    repository: redis
    tag: "7.4.2-alpine"
    pullPolicy: IfNotPresent
  port: 6379
  storage:
    size: 2Gi
    storageClass: ""
  maxmemory: "256mb"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 384Mi

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  # Ingress class — nginx is the most common; change to your controller.
  # Examples: nginx | traefik | haproxy | alb (AWS) | gce (GKE)
  className: nginx
  # Your external hostname (required — also drives OIDC/Google callback URL defaults)
  host: clio.example.com
  # TLS options — see docs/kubernetes.md for all three approaches.
  tls:
    enabled: true
    # cert-manager ClusterIssuer to use for automatic certificate issuance.
    # Set to "" if you are providing the TLS Secret manually.
    certManagerIssuer: letsencrypt-prod
    # Name of the K8s TLS Secret.  cert-manager creates it automatically when
    # certManagerIssuer is set.  Otherwise: kubectl create secret tls clio-tls ...
    secretName: clio-tls

# ── Secrets ───────────────────────────────────────────────────────────────────
# Passwords and cryptographic secrets are AUTO-GENERATED on first install and
# preserved across upgrades via Helm's lookup function — you do NOT set them
# here.  To retrieve the generated admin password after install:
#
#   kubectl get secret clio-secrets -n <namespace> \
#     -o jsonpath='{.data.ADMIN_PASSWORD}' | base64 -d && echo
#
# To rotate all secrets: delete the Secret and run helm upgrade.
#
# Only set the values below if you are enabling Google SSO or generic OIDC.
secrets:
  # Non-secret database config (safe to keep here)
  postgresUser: clio
  postgresDb: redteamlogger

  # ── Google OAuth client secret (only needed when googleSso.enabled=true) ────
  googleClientSecret: ""

  # ── Generic OIDC client secret (only needed when oidc.enabled=true) ─────────
  oidcClientSecret: ""

# ── Backend environment config (non-secret) ───────────────────────────────────
config:
  nodeEnv: production
  timezone: UTC
  # FRONTEND_URL must match the external URL users hit (drives CORS + CSRF).
  # Defaults to https://<ingress.host> — only override if your external URL
  # differs from the Ingress hostname (e.g. a CDN in front).
  frontendUrl: ""    # leave blank to auto-derive from ingress.host

# ── Google OAuth (non-secret config) ─────────────────────────────────────────
# Set secrets.googleClientSecret to enable.
googleSso:
  enabled: false
  # OAuth client ID from Google Cloud Console (not a secret; it appears in redirects)
  clientId: ""
  # Callback URL registered in Google Cloud Console.
  # Leave blank to auto-derive: https://<ingress.host>/api/auth/google/callback
  callbackUrl: ""

# ── Generic OIDC / SSO ────────────────────────────────────────────────────────
# Works with any OIDC-compliant provider: Keycloak, Okta, Azure AD, Auth0,
# Google Workspace, Authentik, Zitadel, Dex, etc.
# Set secrets.oidcClientSecret to enable.
oidc:
  enabled: false
  # Provider discovery URL — the /.well-known/openid-configuration endpoint
  # minus the path suffix (openid-connect library appends it automatically).
  # Examples:
  #   Keycloak:   https://keycloak.example.com/realms/my-realm
  #   Okta:       https://dev-12345.okta.com
  #   Azure AD:   https://login.microsoftonline.com/<tenant-id>/v2.0
  #   Auth0:      https://<tenant>.auth0.com
  issuerUrl: ""
  # OAuth 2.0 client ID (not a secret; it is included in browser redirects)
  clientId: ""
  # Label shown on the login button ("Log in with <providerName>")
  providerName: "SSO"
  # OIDC scopes to request
  scope: "openid email profile"
  # ID token signing algorithm override.
  # Leave blank — the chart auto-detects from the provider's discovery document.
  # Set only if validation fails (e.g. some Azure AD tenants need "RS256").
  idTokenAlg: ""
  # Callback URL registered with the OIDC provider.
  # Leave blank to auto-derive: https://<ingress.host>/api/auth/oidc/callback
  callbackUrl: ""
  # Group-based role assignment.
  # The OIDC provider must include a "groups" claim (or equivalent) in the ID token.
  # Users in neither group are denied access.
  # Leave both blank to allow any authenticated user in as a regular user.
  adminGroup: "clio-admin"
  userGroup:  "clio-user"

# ── NetworkPolicy ──────────────────────────────────────────────────────────────
# Restricts pod-to-pod traffic to only legitimate paths.
# Requires a CNI that enforces NetworkPolicy (flannel+kube-router, Calico, Cilium).
# k3s/Rancher Desktop: works with the default flannel CNI (≥ k3s 1.21).
networkPolicy:
  enabled: true

# ── Linkerd service mesh ───────────────────────────────────────────────────────
# Adds automatic mTLS between all pods via sidecar injection.
# Install Linkerd first (one-time, cluster-wide):
#   curl --proto '=https' --tlsv1.2 -sSfL https://run.linkerd.io/install | sh
#   linkerd install --crds | kubectl apply -f -
#   linkerd install | kubectl apply -f -
#   linkerd check
# Then set enabled: true and run helm upgrade.
linkerd:
  enabled: false
